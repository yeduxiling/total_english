name: CI/CD Production Deploy

on:
  push:
    branches:
      - main  # 监听 main 分支的 push 事件

jobs:
  # ==========================================
  # 阶段 1: CI 自动化构建校验 (代码防崩门禁)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # 验证前端是否能成功通过编译
      - name: Build Frontend Test
        run: |
          cd client
          npm ci
          npm run build

      # 验证后端是否能成功通过编译
      - name: Build Backend Test
        run: |
          cd server
          npm ci
          npm run build

  # ==========================================
  # 阶段 2: CD 自动化部署 (SSH 远程控制)
  # ==========================================
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            # 1. 强制进入服务器项目部署路径
            cd /root/deploy/total_english
            
            # 2. 拉取 GitHub main 分支的最新代码
            git pull origin main
            
            # 3. 一键编译、构建并平滑启动生产容器 (后台模式)
            docker compose -f docker-compose.prod.yml up --build -d
            
            # 4. 清理无用的悬空 Docker 镜像，释放服务器磁盘空间
            docker image prune -f
